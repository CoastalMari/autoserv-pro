<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Orders — AutoServ Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">Auto<span>Serv</span> Pro</a>
  <a href="index.html">Dashboard</a>
  <a href="schedule.html">Schedule</a>
  <a href="workorders.html" class="active">Work Orders</a>
  <a href="inventory.html">Inventory</a>
</nav>

<div class="page">

  <div class="page-header">
    <div class="page-header-left">
      <h1>Work Orders</h1>
      <p>All service appointments and their current status</p>
    </div>
    <a href="schedule.html" class="btn btn-primary">&#43; New Appointment</a>
  </div>

  <div class="filters">
    <input class="filter-input" type="text" id="search" placeholder="Search by name, vehicle, or confirmation #…">
    <select class="filter-select" id="filter-status">
      <option value="">All Statuses</option>
      <option>Pending</option>
      <option>In Progress</option>
      <option>Completed</option>
      <option>Cancelled</option>
    </select>
    <select class="filter-select" id="filter-service">
      <option value="">All Services</option>
      <option>Oil Change</option>
      <option>Brake Check</option>
      <option>Tire Rotation</option>
      <option>Diagnostics</option>
      <option>Transmission Service</option>
      <option>A/C Service</option>
      <option>Battery Replacement</option>
      <option>Wheel Alignment</option>
      <option>Multi-Point Inspection</option>
      <option>Other</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Conf #</th>
          <th>Customer</th>
          <th>Vehicle</th>
          <th>Service</th>
          <th>Date / Time</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="orders-body">
      </tbody>
    </table>
    <div class="empty" id="empty-state" style="display:none;">
      <div class="empty-icon">🔧</div>
      <p>No work orders found. <a href="schedule.html" style="color:var(--accent);">Schedule a service appointment</a> to get started.</p>
    </div>
  </div>

</div>

<!-- Status Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Update Work Order</h2>
    <input type="hidden" id="modal-id">
    <div class="field" style="margin-bottom:20px;">
      <label>Customer</label>
      <div id="modal-customer" style="font-size:16px;font-weight:500;padding:8px 0;"></div>
    </div>
    <div class="field" style="margin-bottom:20px;">
      <label>Service</label>
      <div id="modal-service" style="font-size:16px;font-weight:500;padding:8px 0;"></div>
    </div>
    <div class="field" style="margin-bottom:20px;">
      <label>Status</label>
      <select id="modal-status" style="background:var(--dark);border:1px solid var(--border);color:var(--white);padding:11px 14px;font-family:Barlow,sans-serif;font-size:14px;width:100%;outline:none;">
        <option>Pending</option>
        <option>In Progress</option>
        <option>Completed</option>
        <option>Cancelled</option>
      </select>
    </div>
    <div class="field" style="margin-bottom:24px;">
      <label>Technician Notes</label>
      <textarea id="modal-notes" placeholder="Add notes, parts used, findings…" style="background:var(--dark);border:1px solid var(--border);color:var(--white);padding:11px 14px;font-family:Barlow,sans-serif;font-size:14px;width:100%;outline:none;min-height:90px;resize:vertical;"></textarea>
    </div>
    <div style="display:flex;gap:12px;">
      <button class="btn btn-primary" onclick="saveModal()">Save Changes</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  let orders = getWorkOrders();

  function render() {
    const search = document.getElementById('search').value.toLowerCase();
    const statusF = document.getElementById('filter-status').value;
    const serviceF = document.getElementById('filter-service').value;

    let filtered = orders.filter(o => {
      const vehicle = [o.year, o.make, o.model].filter(Boolean).join(' ') || o.vehicle || '';
      const matchSearch = !search ||
        o.name.toLowerCase().includes(search) ||
        vehicle.toLowerCase().includes(search) ||
        o.confirmation.toLowerCase().includes(search);
      const matchStatus = !statusF || o.status === statusF;
      const matchService = !serviceF || o.service === serviceF;
      return matchSearch && matchStatus && matchService;
    });

    const body = document.getElementById('orders-body');
    const empty = document.getElementById('empty-state');

    if (filtered.length === 0) {
      body.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    body.innerHTML = filtered.map(o => {
      const vehicle = [o.year, o.make, o.model].filter(Boolean).join(' ') || o.vehicle || '—';
      const badgeClass = {
        'Pending': 'badge-pending',
        'In Progress': 'badge-progress',
        'Completed': 'badge-complete',
        'Cancelled': 'badge-cancelled'
      }[o.status] || 'badge-pending';

      let dateStr = o.date;
      try {
        const d = new Date(o.date + 'T12:00:00');
        dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      } catch(e) {}

      return `<tr>
        <td style="font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;color:var(--accent);">${o.confirmation}</td>
        <td>
          <div style="font-weight:500;">${o.name}</div>
          <div style="font-size:12px;color:var(--light);">${o.email || ''}</div>
        </td>
        <td>${vehicle}<br><span style="font-size:12px;color:var(--light);">${o.plate || ''}</span></td>
        <td>${o.service}</td>
        <td>${dateStr}<br><span style="font-size:12px;color:var(--light);">${o.time}</span></td>
        <td><span class="badge ${badgeClass}">${o.status}</span></td>
        <td>
          <button class="btn btn-sm btn-secondary" onclick="openModal('${o.confirmation}')">Edit</button>
        </td>
      </tr>`;
    }).join('');
  }

  function openModal(confNum) {
    const o = orders.find(x => x.confirmation === confNum);
    if (!o) return;
    document.getElementById('modal-id').value = confNum;
    document.getElementById('modal-customer').textContent = o.name;
    document.getElementById('modal-service').textContent = o.service;
    document.getElementById('modal-status').value = o.status || 'Pending';
    document.getElementById('modal-notes').value = o.notes || '';
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  function saveModal() {
    const confNum = document.getElementById('modal-id').value;
    const idx = orders.findIndex(x => x.confirmation === confNum);
    if (idx === -1) return;
    orders[idx].status = document.getElementById('modal-status').value;
    orders[idx].notes = document.getElementById('modal-notes').value;
    localStorage.setItem('workOrders', JSON.stringify(orders));
    closeModal();
    render();
  }

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  document.getElementById('search').addEventListener('input', render);
  document.getElementById('filter-status').addEventListener('change', render);
  document.getElementById('filter-service').addEventListener('change', render);

  render();
</script>

</body>
</html>
