<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parts Inventory — AutoServ Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">Auto<span>Serv</span> Pro</a>
  <a href="index.html">Dashboard</a>
  <a href="schedule.html">Schedule</a>
  <a href="workorders.html">Work Orders</a>
  <a href="inventory.html" class="active">Inventory</a>
</nav>

<div class="page">

  <div class="page-header">
    <div class="page-header-left">
      <h1>Parts Inventory</h1>
      <p>Track stock levels and manage parts</p>
    </div>
    <button class="btn btn-primary" onclick="openAddModal()">&#43; Add Part</button>
  </div>

  <!-- Low stock alert -->
  <div id="low-alert" style="display:none;background:rgba(204,51,51,0.1);border:1px solid #883333;padding:14px 20px;margin-bottom:20px;font-size:13px;color:#e06060;letter-spacing:0.5px;">
    ⚠️ <span id="low-alert-text"></span>
  </div>

  <div class="filters">
    <input class="filter-input" type="text" id="search" placeholder="Search parts…">
    <select class="filter-select" id="filter-cat">
      <option value="">All Categories</option>
      <option>Fluids & Filters</option>
      <option>Brakes</option>
      <option>Tires & Wheels</option>
      <option>Engine</option>
      <option>Electrical</option>
      <option>Suspension</option>
      <option>Other</option>
    </select>
    <select class="filter-select" id="filter-stock">
      <option value="">All Stock Levels</option>
      <option value="low">Low / Critical</option>
      <option value="ok">In Stock</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Part #</th>
          <th>Part Name</th>
          <th>Category</th>
          <th>In Stock</th>
          <th>Min Stock</th>
          <th>Unit Price</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="inv-body"></tbody>
    </table>
    <div class="empty" id="empty-state" style="display:none;">
      <div class="empty-icon">📦</div>
      <p>No parts in inventory. <a href="#" onclick="openAddModal();return false;" style="color:var(--accent);">Add your first part</a> to get started.</p>
    </div>
  </div>

</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Add Part</h2>
    <input type="hidden" id="modal-idx" value="-1">
    <div class="form-grid" style="margin-bottom:16px;">
      <div class="field">
        <label>Part Name <span class="req">*</span></label>
        <input type="text" id="m-name" placeholder="e.g. Oil Filter">
      </div>
      <div class="field">
        <label>Part Number</label>
        <input type="text" id="m-partnum" placeholder="e.g. OIL-FLT-001">
      </div>
      <div class="field">
        <label>Category</label>
        <select id="m-cat" style="background:var(--dark);border:1px solid var(--border);color:var(--white);padding:11px 14px;font-family:Barlow,sans-serif;font-size:14px;width:100%;outline:none;">
          <option>Fluids & Filters</option>
          <option>Brakes</option>
          <option>Tires & Wheels</option>
          <option>Engine</option>
          <option>Electrical</option>
          <option>Suspension</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label>Unit Price ($)</label>
        <input type="number" id="m-price" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="field">
        <label>Quantity in Stock <span class="req">*</span></label>
        <input type="number" id="m-qty" placeholder="0" min="0">
      </div>
      <div class="field">
        <label>Minimum Stock Level</label>
        <input type="number" id="m-min" placeholder="5" min="0">
      </div>
    </div>
    <div id="modal-error" style="color:var(--red);font-size:13px;margin-bottom:16px;display:none;"></div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="savePart()">Save Part</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="delete-btn" style="display:none;margin-left:auto;" onclick="deletePart()">Delete</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  let inventory = getInventory();

  function render() {
    const search = document.getElementById('search').value.toLowerCase();
    const catF = document.getElementById('filter-cat').value;
    const stockF = document.getElementById('filter-stock').value;

    let filtered = inventory.filter((p, i) => {
      p._idx = i;
      const matchSearch = !search || p.name.toLowerCase().includes(search) || (p.partnum || '').toLowerCase().includes(search);
      const matchCat = !catF || p.category === catF;
      const isLow = p.qty <= (p.min || 0);
      const matchStock = !stockF || (stockF === 'low' && isLow) || (stockF === 'ok' && !isLow);
      return matchSearch && matchCat && matchStock;
    });

    // Low stock alert
    const lowItems = inventory.filter(p => p.qty <= (p.min || 0) && p.qty >= 0);
    const alertEl = document.getElementById('low-alert');
    if (lowItems.length > 0) {
      alertEl.style.display = 'block';
      document.getElementById('low-alert-text').textContent =
        lowItems.length + ' item(s) at or below minimum stock: ' + lowItems.map(p => p.name).join(', ');
    } else {
      alertEl.style.display = 'none';
    }

    const body = document.getElementById('inv-body');
    const empty = document.getElementById('empty-state');

    if (filtered.length === 0) {
      body.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    body.innerHTML = filtered.map(p => {
      const isLow = p.qty <= (p.min || 0);
      const isOut = p.qty === 0;
      let badgeClass = 'badge-complete', badgeLabel = 'In Stock';
      if (isOut) { badgeClass = 'badge-critical'; badgeLabel = 'Out of Stock'; }
      else if (isLow) { badgeClass = 'badge-medium'; badgeLabel = 'Low Stock'; }

      return `<tr>
        <td style="font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;color:var(--light);font-size:12px;">${p.partnum || '—'}</td>
        <td style="font-weight:500;">${p.name}</td>
        <td style="font-size:13px;color:var(--light);">${p.category || '—'}</td>
        <td style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;${isLow ? 'color:var(--accent);' : ''}">${p.qty}</td>
        <td style="font-size:13px;color:var(--light);">${p.min || 0}</td>
        <td>$${parseFloat(p.price || 0).toFixed(2)}</td>
        <td><span class="badge ${badgeClass}">${badgeLabel}</span></td>
        <td>
          <button class="btn btn-sm btn-secondary" onclick="openEditModal(${p._idx})">Edit</button>
        </td>
      </tr>`;
    }).join('');
  }

  function openAddModal() {
    document.getElementById('modal-title').textContent = 'Add Part';
    document.getElementById('modal-idx').value = -1;
    document.getElementById('m-name').value = '';
    document.getElementById('m-partnum').value = '';
    document.getElementById('m-cat').value = 'Fluids & Filters';
    document.getElementById('m-price').value = '';
    document.getElementById('m-qty').value = '';
    document.getElementById('m-min').value = '5';
    document.getElementById('delete-btn').style.display = 'none';
    document.getElementById('modal-error').style.display = 'none';
    document.getElementById('modal').classList.add('open');
    setTimeout(() => document.getElementById('m-name').focus(), 100);
  }

  function openEditModal(idx) {
    const p = inventory[idx];
    if (!p) return;
    document.getElementById('modal-title').textContent = 'Edit Part';
    document.getElementById('modal-idx').value = idx;
    document.getElementById('m-name').value = p.name;
    document.getElementById('m-partnum').value = p.partnum || '';
    document.getElementById('m-cat').value = p.category || 'Other';
    document.getElementById('m-price').value = p.price || '';
    document.getElementById('m-qty').value = p.qty;
    document.getElementById('m-min').value = p.min || 0;
    document.getElementById('delete-btn').style.display = 'inline-flex';
    document.getElementById('modal-error').style.display = 'none';
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  function savePart() {
    const name = document.getElementById('m-name').value.trim();
    const qty = document.getElementById('m-qty').value;
    const errEl = document.getElementById('modal-error');

    if (!name || qty === '') {
      errEl.textContent = 'Part name and quantity are required.';
      errEl.style.display = 'block';
      return;
    }

    const part = {
      name,
      partnum: document.getElementById('m-partnum').value.trim(),
      category: document.getElementById('m-cat').value,
      price: parseFloat(document.getElementById('m-price').value) || 0,
      qty: parseInt(qty) || 0,
      min: parseInt(document.getElementById('m-min').value) || 0
    };

    const idx = parseInt(document.getElementById('modal-idx').value);
    if (idx === -1) {
      inventory.push(part);
    } else {
      inventory[idx] = part;
    }
    localStorage.setItem('inventory', JSON.stringify(inventory));
    closeModal();
    render();
  }

  function deletePart() {
    const idx = parseInt(document.getElementById('modal-idx').value);
    if (idx === -1) return;
    if (!confirm('Delete this part from inventory?')) return;
    inventory.splice(idx, 1);
    localStorage.setItem('inventory', JSON.stringify(inventory));
    closeModal();
    render();
  }

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  document.getElementById('search').addEventListener('input', render);
  document.getElementById('filter-cat').addEventListener('change', render);
  document.getElementById('filter-stock').addEventListener('change', render);

  render();
</script>

</body>
</html>
