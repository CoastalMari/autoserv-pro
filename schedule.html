<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule Service — AutoServ Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">Auto<span>Serv</span> Pro</a>
  <a href="index.html">Dashboard</a>
  <a href="schedule.html" class="active">Schedule</a>
  <a href="workorders.html">Work Orders</a>
  <a href="inventory.html">Inventory</a>
</nav>

<div class="page">

  <div class="page-header">
    <div class="page-header-left">
      <h1>Schedule Service</h1>
      <p>Book a new service appointment</p>
    </div>
    <a href="index.html" class="btn btn-secondary">← Back</a>
  </div>

  <form id="form" autocomplete="off">

    <div class="form-section">
      <div class="form-section-title">Customer Information</div>
      <div class="form-grid">
        <div class="field">
          <label>Full Name <span class="req">*</span></label>
          <input type="text" id="name" placeholder="Jane Smith">
        </div>
        <div class="field">
          <label>Email Address <span class="req">*</span></label>
          <input type="email" id="email" placeholder="jane@example.com">
        </div>
        <div class="field">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="(555) 000-0000">
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Vehicle Information</div>
      <div class="form-grid three">
        <div class="field">
          <label>Year</label>
          <input type="text" id="year" placeholder="2021">
        </div>
        <div class="field">
          <label>Make</label>
          <input type="text" id="make" placeholder="Toyota">
        </div>
        <div class="field">
          <label>Model</label>
          <input type="text" id="model" placeholder="Camry">
        </div>
        <div class="field">
          <label>License Plate</label>
          <input type="text" id="plate" placeholder="ABC-1234">
        </div>
        <div class="field">
          <label>Mileage</label>
          <input type="text" id="mileage" placeholder="45,000">
        </div>
        <div class="field">
          <label>VIN (optional)</label>
          <input type="text" id="vin" placeholder="1HGBH41JXMN109186">
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Service Details</div>
      <div class="form-grid">
        <div class="field">
          <label>Service Type <span class="req">*</span></label>
          <select id="service">
            <option value="">— Select Service —</option>
            <option>Oil Change</option>
            <option>Brake Check</option>
            <option>Tire Rotation</option>
            <option>Diagnostics</option>
            <option>Transmission Service</option>
            <option>A/C Service</option>
            <option>Battery Replacement</option>
            <option>Wheel Alignment</option>
            <option>Multi-Point Inspection</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field">
          <label>Priority</label>
          <select id="priority">
            <option value="Normal">Normal</option>
            <option value="Urgent">Urgent</option>
            <option value="Routine">Routine</option>
          </select>
        </div>
        <div class="field">
          <label>Preferred Date <span class="req">*</span></label>
          <input type="date" id="date">
        </div>
        <div class="field">
          <label>Preferred Time <span class="req">*</span></label>
          <select id="time">
            <option value="">— Select Time —</option>
            <option>8:00 AM</option>
            <option>9:00 AM</option>
            <option>10:00 AM</option>
            <option>11:00 AM</option>
            <option>1:00 PM</option>
            <option>2:00 PM</option>
            <option>3:00 PM</option>
            <option>4:00 PM</option>
          </select>
        </div>
        <div class="field span2">
          <label>Describe the Issue</label>
          <textarea id="issue" placeholder="Describe any symptoms, noises, or concerns the customer has reported..."></textarea>
        </div>
      </div>
    </div>

    <div id="error" class="error-msg"></div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Book Appointment →</button>
      <a href="index.html" class="btn btn-secondary">Cancel</a>
    </div>

  </form>

</div>

<script src="script.js"></script>
</body>
</html>
